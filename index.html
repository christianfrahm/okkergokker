<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>okkergokker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: #000;
    }

    body {
      background: #000;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #000;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      z-index: 0;
    }

    .title {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      font-size: clamp(2.5rem, 10vw, 8rem);
      font-weight: bold;
      color: #fff;
      text-transform: lowercase;
      text-decoration: none;
      cursor: pointer;
      z-index: 2;
    }

    .title:hover {
      opacity: 0.85;
    }

    .playlist-section {
      display: flex;
      justify-content: center;
      padding: 4rem 1.5rem 6rem;
      background: #000;
    }

    .playlist-box {
      width: 100%;
      max-width: 660px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(255, 255, 255, 0.08);
    }

    .playlist-box iframe {
      display: block;
      width: 100%;
      height: 480px;
      border: 0;
    }
  </style>
</head>
<body>
  <section class="hero">
    <video autoplay loop muted playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>
    <a class="title" href="#playlist">okkergokker</a>
  </section>

  <section id="playlist" class="playlist-section">
    <div class="playlist-box">
      <iframe
        src="https://open.spotify.com/embed/playlist/2YKqVVF9iaXZ7ZRbeT5M8l?utm_source=generator&theme=0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"
        title="bobs(chill) på Spotify">
      </iframe>
    </div>
  </section>
</body>
</html>

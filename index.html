<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>okkergokker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100%;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      font-size: clamp(2.5rem, 10vw, 8rem);
      font-weight: bold;
      color: #fff;
      text-transform: lowercase;
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="page">
    <video autoplay loop muted playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>
    <div class="title">okkergokker</div>
  </div>
</body>
</html>
